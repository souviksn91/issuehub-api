<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IssueHub API</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #ffffff;
            color: #091240;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 60px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 44px;
            font-weight: 700;
        }

        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        /* Outline Button */
        .btn-outline {
            border: 1px solid #091240;
            color: #091240;
        }

        .btn-outline:hover {
            background-color: #091240;
            color: #ffffff;
        }

        /* Solid Button */
        .btn-solid {
            background-color: #00B6E0;
            color: #ffffff;
        }

        .btn-solid:hover {
            background-color: #009ac0;
            transform: translateY(-1px);
        }

        .divider-main {
            margin-top: 24px;
            border-top: 1px solid #091240;
        }

        /* Typography */
        .intro {
            font-size: 20px;
            line-height: 30px;
            margin-top: 30px;
        }

        .paragraph {
            font-size: 16px;
            line-height: 26px;
            margin-top: 16px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            margin-top: 4px;
            margin-bottom: 8px;
        }

        .subheading {
            font-size: 16px;
            font-weight: 600;
            margin-top: 4px;
            margin-bottom: 4px;
        }

        ul, ol {
            margin-top: 10px;
            padding-left: 20px;
        }

        li {
            font-size: 16px;
            line-height: 24px;
            margin-bottom: 2px;
        }

        .section-divider {
            border-top: 1px solid #D8D8E2;
            margin: 20px 0;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 50px;
            border-top: 1px solid #091240;
        }

        .footer-text {
            font-size: 14px;
        }

        .footer-name {
            font-size: 16px;
            font-weight: 600;
        }

        /* 📱 Mobile Responsiveness */
        @media (max-width: 768px) {

            .container {
                padding: 40px 20px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
            }

            .logo {
                font-size: 32px;
            }

            .button-group {
                width: 100%;
            }

            .btn {
                width: 100%;
                text-align: center;
            }

            .intro {
                font-size: 18px;
            }

            .section-title {
                font-size: 20px;
            }
        }

    </style>
</head>
<body>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
